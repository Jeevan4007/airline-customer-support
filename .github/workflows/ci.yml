name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Install lightweight test deps only
        # Heavy ML libraries are not needed for the guardrail unit tests
        run: pip install pytest

      - name: Run unit tests (guardrails only)
        run: pytest tests/test_guardrails.py -v
